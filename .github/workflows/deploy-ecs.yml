name: Deploy to ECS (Fargate) via Docker Hub

on:
  push:
    branches: [ "main" ]

env:
  CLUSTER_NAME: alura
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          # Auth service
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }} \
            ./burguer-app/auth-service \
            --push

          # User service
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }} \
            ./burguer-app/user-service \
            --push

          # Order service
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }} \
            ./burguer-app/order-service \
            --push

          # Product service
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }} \
            ./burguer-app/product-service \
            --push

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Force new deployment on ECS services
        run: |
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "auth-service" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "user-service" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "order-service" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "product-service" --force-new-deployment
