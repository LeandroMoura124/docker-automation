name: Docker Dev Workflow

on:
  push:
    branches:
      - main
      - teste_pipline_docker-dev
  pull_request:

jobs:
  docker-up:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Definir variáveis de ambiente
      - name: Set environment variables
        run: |
          echo "DOCKER_USER=leandrotz" >> $GITHUB_ENV
          echo "TAG=latest" >> $GITHUB_ENV

      # 3️⃣ Login no Docker Hub (evita erro 401 / rate limit)
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Export MONGO_URI globally
        run: echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> $GITHUB_ENV

      # 4️⃣ Instalar Docker Compose
      - name: Install Docker Compose
        run: |
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          docker-compose --version

      # 5️⃣ Criar .env para os microsserviços
      - name: Create .env files
        working-directory: burguer-app
        run: |
          for service in user-service product-service order-service auth-service; do
            mkdir -p $service
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > $service/.env
          done

      # 6️⃣ Subir containers
      - name: Bring up Docker Compose (Dev)
        working-directory: burguer-app
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.override.yml down --volumes
          docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d --build

      # 7️⃣ Esperar Mongo subir
      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && break
            echo "Waiting for MongoDB..."
            sleep 2
          done

      # 8️⃣ Rodar testes
      - name: Test auth-service
        working-directory: burguer-app/auth-service
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test order-service
        working-directory: burguer-app/order-service
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test product-service
        working-directory: burguer-app/product-service
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test user-service
        working-directory: burguer-app/user-service
        run: |
          pip install -r requirements.txt
          pytest -v

      # 9️⃣ Derrubar containers
      - name: Shut down containers
        working-directory: burguer-app
        run: docker-compose down --volumes

      # 🔟 Instalar Trivy (forma correta)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 1️⃣1️⃣ Scan de vulnerabilidades
      - name: Scan auth-service image
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 burguer-app-auth-service:latest

      - name: Scan user-service image
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 burguer-app-user-service:latest

      - name: Scan product-service image
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 burguer-app-product-service:latest

      - name: Scan order-service image
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 burguer-app-order-service:latest