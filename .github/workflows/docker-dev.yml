name: Docker Dev Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-up:
    runs-on: ubuntu-latest
    env:
      DOCKER_MONGO_URI: mongodb://appuser:apppass@mongo:27017/burguer_app_db?authSource=burguer_app_db
      HOST_MONGO_URI: mongodb://appuser:apppass@localhost:27017/burguer_app_db?authSource=burguer_app_db
      SECRET_KEY: ci-secret-key
      JWT_SECRET: ci-jwt-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Create CI .env files
        working-directory: burguer-app
        run: |
          printf '%s\n' \
            "MONGO_URI=${DOCKER_MONGO_URI}" \
            > .env

          printf '%s\n' \
            "MONGO_URI=${DOCKER_MONGO_URI}" \
            "SECRET_KEY=${SECRET_KEY}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "PORT=5000" \
            > auth-service/.env

          for service in user-service order-service product-service; do
            port=""

            case "$service" in
              user-service) port=5001 ;;
              order-service) port=5002 ;;
              product-service) port=5003 ;;
            esac

            printf '%s\n' \
              "MONGO_URI=${DOCKER_MONGO_URI}" \
              "SECRET_KEY=${SECRET_KEY}" \
              "PORT=${port}" \
              > "${service}/.env"
          done

      - name: Bring up Docker Compose (Dev)
        working-directory: burguer-app
        run: |
          docker compose down --volumes --remove-orphans || true
          docker compose up -d --build
          docker compose ps

      - name: Wait for MongoDB
        working-directory: burguer-app
        run: |
          for i in {1..30}; do
            if docker compose exec -T mongo mongosh --quiet \
              "mongodb://appuser:apppass@localhost:27017/burguer_app_db?authSource=burguer_app_db" \
              --eval "db.adminCommand('ping').ok" | grep -q 1; then
              echo "MongoDB is ready"
              exit 0
            fi

            echo "Waiting for MongoDB..."
            sleep 2
          done

          echo "MongoDB did not become ready in time"
          exit 1

      - name: Test auth-service
        working-directory: burguer-app/auth-service
        env:
          MONGO_URI: ${{ env.HOST_MONGO_URI }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test order-service
        working-directory: burguer-app/order-service
        env:
          MONGO_URI: ${{ env.HOST_MONGO_URI }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test product-service
        working-directory: burguer-app/product-service
        env:
          MONGO_URI: ${{ env.HOST_MONGO_URI }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Test user-service
        working-directory: burguer-app/user-service
        env:
          MONGO_URI: ${{ env.HOST_MONGO_URI }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
        run: |
          pip install -r requirements.txt
          pytest -v

      - name: Scan auth-service image with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 image --severity HIGH,CRITICAL --exit-code 1 \
            burguer-app-auth-service:latest

      - name: Scan user-service image with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 image --severity HIGH,CRITICAL --exit-code 1 \
            burguer-app-user-service:latest

      - name: Scan product-service image with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 image --severity HIGH,CRITICAL --exit-code 1 \
            burguer-app-product-service:latest

      - name: Scan order-service image with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 image --severity HIGH,CRITICAL --exit-code 1 \
            burguer-app-order-service:latest

      - name: Run Safety check (user-service)
        working-directory: burguer-app
        run: |
          docker run --rm -v "$PWD/user-service:/src" python:3.12-slim bash -c "pip install safety && safety check -r /src/requirements.txt"

      - name: Run Safety check (product-service)
        working-directory: burguer-app
        run: |
          docker run --rm -v "$PWD/product-service:/src" python:3.12-slim bash -c "pip install safety && safety check -r /src/requirements.txt"

      - name: Run Safety check (order-service)
        working-directory: burguer-app
        run: |
          docker run --rm -v "$PWD/order-service:/src" python:3.12-slim bash -c "pip install safety && safety check -r /src/requirements.txt"

      - name: Run Safety check (auth-service)
        working-directory: burguer-app
        run: |
          docker run --rm -v "$PWD/auth-service:/src" python:3.12-slim bash -c "pip install safety && safety check -r /src/requirements.txt"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Show Docker logs on failure
        if: failure()
        working-directory: burguer-app
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        working-directory: burguer-app
        run: docker compose down --volumes --remove-orphans
