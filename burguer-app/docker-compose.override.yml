
services:
  # ✅ Mongo containerizado (DEV)
  mongo:
    build: ./mongo
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices-network

  # ✅ URI do Mongo: use .env com MONGO_URI ou padrão local
  auth-service:
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@mongo:27017}

  user-service:
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@mongo:27017}

  order-service:
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@mongo:27017}

  product-service:
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@mongo:27017}

volumes:
  mongo_data:
