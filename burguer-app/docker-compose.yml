services:
  auth-service:
    image: ${DOCKER_USER}/auth-service:${TAG}
    container_name: auth-service
    ports:
      - "5000:5000"
    env_file:
      - ./auth-service/.env
    networks:
      - microservices-network

  user-service:
    image: ${DOCKER_USER}/user-service:${TAG}
    container_name: user-service
    ports:
      - "5001:5001"
    env_file:
      - ./user-service/.env
    networks:
      - microservices-network

  order-service:
    image: ${DOCKER_USER}/order-service:${TAG}
    container_name: order-service
    ports:
      - "5002:5002"
    env_file:
      - ./order-service/.env
    networks:
      - microservices-network

  product-service:
    image: ${DOCKER_USER}/product-service:${TAG}
    container_name: product-service
    ports:
      - "5003:5003"
    env_file:
      - ./product-service/.env
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge